<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 8 Science Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #38bdf8;
    --accent2: #f472b6;
    --accent3: #34d399;
    --accent4: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #1e293b;
    --correct: #34d399;
    --wrong: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG decoration */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(56,189,248,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(244,114,182,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* HEADER */
  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: sticky;
    top: 0;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .stats-bar {
    margin-left: auto;
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* MAIN LAYOUT */
  .container {
    display: flex;
    height: calc(100vh - 80px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    min-width: 280px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1rem 0;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-title {
    padding: 0 1.2rem 0.8rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .unit-btn {
    width: 100%;
    padding: 0.6rem 1.2rem;
    background: none;
    border: none;
    color: var(--muted);
    text-align: left;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    border-left: 3px solid transparent;
  }

  .unit-btn:hover { color: var(--text); background: var(--surface); }
  .unit-btn.active {
    color: var(--accent);
    background: rgba(56,189,248,0.08);
    border-left-color: var(--accent);
  }

  .unit-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 22px;
  }

  .unit-btn.active .unit-num { color: var(--accent); }

  .unit-check {
    margin-left: auto;
    font-size: 0.7rem;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
  }

  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .unit-header {
    margin-bottom: 2rem;
    animation: fadeIn 0.3s ease;
  }

  .unit-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }

  .unit-title {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .unit-desc {
    color: var(--muted);
    font-size: 0.9rem;
    max-width: 600px;
  }

  /* MODE TABS */
  .mode-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    background: var(--surface);
    padding: 0.3rem;
    border-radius: 12px;
    width: fit-content;
  }

  .mode-tab {
    padding: 0.5rem 1.2rem;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 9px;
    transition: all 0.2s;
  }

  .mode-tab.active {
    background: var(--accent);
    color: var(--bg);
  }

  /* FLASHCARD VIEW */
  .flashcard-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  .card-counter {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .flashcard {
    width: 100%;
    max-width: 600px;
    height: 260px;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .flashcard.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    border: 1px solid var(--border);
  }

  .card-front {
    background: var(--surface);
  }

  .card-back {
    background: linear-gradient(135deg, #0f2744, #1a2235);
    transform: rotateY(180deg);
    border-color: var(--accent);
  }

  .card-hint {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 1rem;
    font-family: 'Space Mono', monospace;
  }

  .card-word {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .card-back .card-word {
    color: var(--accent);
    font-size: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-def {
    font-size: 1rem;
    color: var(--text);
    line-height: 1.5;
  }

  .card-example {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.8rem;
    font-style: italic;
  }

  .flip-hint {
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .card-nav {
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .nav-btn {
    padding: 0.7rem 1.8rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.15s;
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .nav-btn.primary:hover { opacity: 0.9; }

  /* WORD LIST VIEW */
  .word-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    animation: fadeIn 0.3s ease;
  }

  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem;
    transition: all 0.2s;
    cursor: default;
  }

  .word-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(56,189,248,0.1);
  }

  .word-card .term {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  .word-card .def {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.5;
  }

  .word-card .ex {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* QUIZ VIEW */
  .quiz-area {
    max-width: 620px;
    animation: fadeIn 0.3s ease;
  }

  .quiz-question {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .q-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 0.8rem;
  }

  .q-text {
    font-size: 1.2rem;
    font-weight: 600;
    line-height: 1.4;
  }

  .q-options {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .q-option {
    padding: 0.9rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .q-option:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

  .q-option.correct { border-color: var(--correct); background: rgba(52,211,153,0.1); color: var(--correct); }
  .q-option.wrong { border-color: var(--wrong); background: rgba(248,113,113,0.1); color: var(--wrong); }

  .opt-letter {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .quiz-feedback {
    margin-top: 1rem;
    padding: 1rem 1.2rem;
    border-radius: 12px;
    font-size: 0.9rem;
    display: none;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: rgba(52,211,153,0.1); border: 1px solid var(--correct); color: var(--correct); }
  .quiz-feedback.wrong { background: rgba(248,113,113,0.1); border: 1px solid var(--wrong); color: var(--wrong); }

  .quiz-score {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
  }

  .score-item { text-align: center; }
  .score-num { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; }
  .score-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
  .s-correct .score-num { color: var(--correct); }
  .s-wrong .score-num { color: var(--wrong); }

  /* MATCH GAME */
  .match-area {
    animation: fadeIn 0.3s ease;
  }

  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 800px;
  }

  .match-col-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 0.8rem;
  }

  .match-item {
    padding: 0.8rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.88rem;
    transition: all 0.15s;
    margin-bottom: 0.6rem;
    line-height: 1.4;
  }

  .match-item:hover:not(.matched):not(.disabled) { border-color: var(--accent); color: var(--accent); }
  .match-item.selected { border-color: var(--accent4); background: rgba(251,191,36,0.1); color: var(--accent4); }
  .match-item.matched { border-color: var(--correct); background: rgba(52,211,153,0.08); color: var(--correct); opacity: 0.7; cursor: default; }
  .match-item.wrong-shake { animation: shake 0.4s; border-color: var(--wrong); }

  .match-score {
    margin-bottom: 1.2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .match-score span { color: var(--accent3); font-size: 1rem; }

  /* COMPLETE SCREEN */
  .complete-screen {
    text-align: center;
    padding: 3rem;
    display: none;
  }

  .complete-screen.show { display: block; animation: fadeIn 0.5s ease; }

  .trophy { font-size: 4rem; margin-bottom: 1rem; }

  .complete-title {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .complete-msg { color: var(--muted); margin-bottom: 2rem; }

  /* ANIMATIONS */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .hidden { display: none !important; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .container { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: auto; border-right: none; border-bottom: 1px solid var(--border); max-height: 200px; }
    .match-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 1rem; }
  }

  /* ====== LOGIN SCREEN ====== */
  #loginScreen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  #loginScreen::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 40%, rgba(56,189,248,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(244,114,182,0.1) 0%, transparent 55%);
    pointer-events: none;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 0.4rem;
  }

  .login-logo .icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }

  .login-title {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }

  .login-sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    margin-bottom: 2rem;
  }

  .login-field {
    margin-bottom: 1rem;
  }

  .login-label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 0.4rem;
  }

  .login-input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, var(--accent), #0ea5e9);
    border: none;
    border-radius: 10px;
    color: var(--bg);
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }

  .login-btn:hover { opacity: 0.9; }

  .login-error {
    color: var(--wrong);
    font-size: 0.82rem;
    text-align: center;
    margin-top: 0.8rem;
    min-height: 1.2em;
  }

  .login-wave {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .login-wave span {
    width: 4px; height: 20px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
    opacity: 0.7;
  }

  .login-wave span:nth-child(2) { animation-delay: 0.1s; background: var(--accent2); }
  .login-wave span:nth-child(3) { animation-delay: 0.2s; }
  .login-wave span:nth-child(4) { animation-delay: 0.3s; background: var(--accent3); }
  .login-wave span:nth-child(5) { animation-delay: 0.4s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* ====== USER BADGE in HEADER ====== */
  .user-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.8rem 0.3rem 0.4rem;
    font-size: 0.82rem;
  }

  .user-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
  }

  /* ====== PHONETIC STYLES ====== */
  .phonetic {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent3);
    margin-top: 0.15rem;
    letter-spacing: 0.02em;
  }

  .speak-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 7px;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--muted);
    transition: all 0.15s;
    vertical-align: middle;
    margin-left: 0.4rem;
  }

  .speak-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .speak-btn.speaking { color: var(--accent3); border-color: var(--accent3); animation: pulse 0.6s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  .word-card .term-row { display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem; }

  /* ====== QUIZ REPORT SCREEN ====== */
  .quiz-report {
    max-width: 680px;
    animation: fadeIn 0.4s ease;
  }

  .report-header {
    text-align: center;
    padding: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 1.5rem;
  }

  .report-trophy { font-size: 3.5rem; margin-bottom: 0.8rem; }

  .report-name {
    font-size: 1.1rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .report-title {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.2rem;
  }

  .report-stats {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .report-stat {
    background: var(--surface2);
    border-radius: 12px;
    padding: 0.8rem 1.2rem;
    text-align: center;
    min-width: 90px;
  }

  .report-stat .num {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
  }

  .report-stat .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  {
    id: 22, title: "Introduction to Ohm's Law",
    desc: "The relationship between voltage, current, and resistance.",
    words: [
      { term: "Ohm's Law", def: "V = I × R; the voltage across a conductor equals the current through it multiplied by its resistance.", ex: "If I = 2 A and R = 5 Ω, then V = 2 × 5 = 10 V." },
      { term: "Ohmic conductor", def: "A conductor that obeys Ohm's law; current is directly proportional to voltage at constant temperature.", ex: "A metal wire at constant temperature is an ohmic conductor." },
      { term: "Non-ohmic conductor", def: "A conductor that does not obey Ohm's law; e.g., a light bulb or diode.", ex: "A diode is non-ohmic — it only allows current one way." },
      { term: "I-V graph", def: "A graph of current (y-axis) versus voltage (x-axis) for a component; straight line = ohmic.", ex: "An I-V graph for a resistor is a straight line through the origin." },
      { term: "Gradient (I-V)", def: "The slope of an I-V graph equals 1/R (reciprocal of resistance).", ex: "A steeper I-V gradient means lower resistance." },
      { term: "Proportional", def: "One quantity changes by the same factor as another; doubling one doubles the other.", ex: "In an ohmic conductor, current and voltage are directly proportional." },
      { term: "Linear relationship", def: "A relationship that, when graphed, forms a straight line.", ex: "V = IR is a linear relationship — doubling V doubles I." },
      { term: "Resistance formula", def: "R = V ÷ I; resistance equals voltage divided by current.", ex: "If V = 12 V and I = 3 A, then R = 12 ÷ 3 = 4 Ω." },
      { term: "Temperature effect on resistance", def: "For most conductors, resistance increases with temperature; for semiconductors, it decreases.", ex: "A tungsten filament has much higher resistance when hot than when cold." },
      { term: "Georg Ohm", def: "German physicist (1789–1854) who formulated Ohm's Law from experimental measurements.", ex: "Georg Ohm published his famous law in 1827 after meticulous circuit experiments." },
    ]
  },
  {

    desc: "Applying Ohm's Law to calculate voltage, current, and resistance in series circuits.",
    words: [

      { term: "Ammeter (in series)", def: "An ammeter must be connected in series to measure the current flowing through a branch.", ex: "Placing an ammeter in series does not significantly change the circuit current because it has very low resistance." },
      { term: "Voltmeter (in parallel)", def: "A voltmeter must be connected in parallel across a component to measure its voltage.", ex: "A voltmeter has very high resistance to avoid drawing current from the circuit." },
    ]
  },
  {

    desc: "How parallel circuits provide multiple paths for current and maintain voltage.",
    words: [
      { term: "Parallel circuit", def: "A circuit where components are connected across the same two points, providing multiple paths for current.", ex: "Household electrical sockets are wired in parallel so each appliance gets full mains voltage." },

      { term: "Branch", def: "One individual path in a parallel circuit.", ex: "Each appliance in a home is on its own branch of the parallel circuit." },

      { term: "Node", def: "A point in a circuit where two or more components connect.", ex: "Current conservation applies at every node in a circuit." },
      { term: "Reciprocal method", def: "Method to find total parallel resistance: R_T = 1 ÷ (1/R₁ + 1/R₂).", ex: "For two 10 Ω resistors in parallel: R_T = 1 ÷ (0.1 + 0.1) = 5 Ω." },
      { term: "Independent operation", def: "In a parallel circuit, each component operates independently of the others.", ex: "Switching off one light in a parallel circuit does not affect the others." },
    ]

// ===================== STATE =====================
let currentUnitIdx = 0;
let currentMode = 'list';
let flashIdx = 0;
let flashFlipped = false;
let quizState = { idx: 0, correct: 0, wrong: 0, answered: false };
let matchState = { selected: null, selectedType: null, matched: 0, total: 0 };
let learnedUnits = new Set();

// ===================== INIT =====================
function init() {
  buildSidebar();
  showUnit(0);
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  const frag = document.createDocumentFragment();
  const title = document.createElement('div');
  title.className = 'sidebar-title';
  title.textContent = 'Units';
  frag.appendChild(title);
  units.forEach((u, i) => {
    const btn = document.createElement('button');
    btn.className = 'unit-btn' + (i === 0 ? ' active' : '');
    btn.id = 'ubtn-' + i;
    btn.onclick = () => showUnit(i);
    btn.innerHTML = `<span class="unit-num">${String(i+1).padStart(2,'0')}</span>${u.title}<span class="unit-check" id="ucheck-${i}"></span>`;
    frag.appendChild(btn);
  });
  sb.innerHTML = '';
  sb.appendChild(frag);
}

function showUnit(idx) {
  currentUnitIdx = idx;
  flashIdx = 0;
  flashFlipped = false;
  quizState = { idx: 0, correct: 0, wrong: 0, answered: false };
  quizHistory = [];
  matchState = { selected: null, selectedType: null, matched: 0, total: 0 };

  // update sidebar active
  document.querySelectorAll('.unit-btn').forEach((b,i) => b.classList.toggle('active', i === idx));

  const u = units[idx];
  document.getElementById('unitHeader').innerHTML = `
    <div class="unit-tag">Unit ${u.id} · Physics 八下</div>
    <div class="unit-title">${u.title}</div>
    <div class="unit-desc">${u.desc}</div>
  `;

  renderMode();
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    const modes = ['list','flash','quiz','match'];
    t.classList.toggle('active', modes[i] === mode);
  });
  renderMode();
}

function renderMode() {
  document.getElementById('modeList').className = currentMode === 'list' ? 'word-list' : 'hidden';
  document.getElementById('modeFlash').className = currentMode === 'flash' ? 'flashcard-area' : 'hidden';
  document.getElementById('modeQuiz').className = currentMode === 'quiz' ? 'quiz-area' : 'hidden';
  document.getElementById('modeMatch').className = currentMode === 'match' ? 'match-area' : 'hidden';

  if (currentMode === 'list') renderList();
  else if (currentMode === 'flash') renderFlash();
  else if (currentMode === 'quiz') renderQuiz();
  else if (currentMode === 'match') renderMatch();
}

// ===================== LIST MODE =====================
function renderList() {
  const u = units[currentUnitIdx];
  const container = document.getElementById('modeList');
  container.innerHTML = u.words.map((w,i) => {
    const ipa = phonetics[w.term] || '';
    return `
    <div class="word-card">
      <div class="term-row">
        <span class="term">${w.term}</span>
        <button class="speak-btn" onclick="speak('${w.term.replace(/'/g,"\\'")}', this)" title="Listen">🔊</button>
      </div>
      ${ipa ? `<div class="phonetic">${ipa}</div>` : ''}
      <div class="def">${w.def}</div>
      ${w.ex ? `<div class="ex">e.g. ${w.ex}</div>` : ''}
    </div>
  `}).join('');
}

// ===================== FLASHCARD MODE =====================
function renderFlash() {
  const u = units[currentUnitIdx];
  const w = u.words[flashIdx];
  const container = document.getElementById('modeFlash');
  const pct = ((flashIdx) / u.words.length * 100).toFixed(0);
  const ipa = phonetics[w.term] || '';
  const safeterm = w.term.replace(/'/g,"\\'");
  container.innerHTML = `
    <div style="width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;">
      <div class="card-counter">Card ${flashIdx+1} of ${u.words.length}</div>
      <div class="flip-hint">👆 Click card to flip</div>
    </div>
    <div class="progress-bar-wrap" style="width:100%;max-width:600px;">
      <div class="progress-bar" style="width:${pct}%"></div>
    </div>
    <div class="flashcard" id="thecard" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-hint">Term</div>
          <div class="card-word">${w.term}</div>
          ${ipa ? `<div class="phonetic" style="margin-top:0.5rem">${ipa}</div>` : ''}
          <button class="speak-btn" style="margin-top:0.8rem;font-size:0.9rem;padding:4px 12px;" onclick="event.stopPropagation();speak('${safeterm}',this)">🔊 Listen</button>
        </div>
        <div class="card-face card-back">
          <div class="card-hint">Definition</div>
          <div class="card-word">${w.term}</div>
          <div class="card-def">${w.def}</div>
          ${w.ex ? `<div class="card-example">e.g. ${w.ex}</div>` : ''}
          <button class="speak-btn" style="margin-top:0.8rem;font-size:0.85rem;padding:4px 10px;" onclick="event.stopPropagation();speak('${w.def.replace(/'/g,"\\'")}',this)">🔊 Hear definition</button>
        </div>
      </div>
    </div>
    <div class="card-nav">
      <button class="nav-btn" onclick="flashNav(-1)">← Prev</button>
      <button class="nav-btn primary" onclick="flashNav(1)">${flashIdx < u.words.length-1 ? 'Next →' : '✓ Done'}</button>
    </div>
  `;
  flashFlipped = false;
}

function flipCard() {
  const card = document.getElementById('thecard');
  flashFlipped = !flashFlipped;
  card.classList.toggle('flipped', flashFlipped);
}

function flashNav(dir) {
  const u = units[currentUnitIdx];
  flashIdx = Math.min(Math.max(flashIdx + dir, 0), u.words.length - 1);
  flashFlipped = false;
  renderFlash();
  if (flashIdx === u.words.length - 1) markLearned();
}

// ===================== QUIZ MODE =====================
function renderQuiz() {
  const u = units[currentUnitIdx];
  const container = document.getElementById('modeQuiz');
  if (quizState.idx >= u.words.length) {
    showQuizReport(u);
    return;
  }

  const correctWord = u.words[quizState.idx];
  const pool = u.words.filter((_,i) => i !== quizState.idx);
  const wrongs = pool.sort(() => Math.random()-0.5).slice(0,3);
  const options = [correctWord, ...wrongs].sort(() => Math.random()-0.5);
  const letters = ['A','B','C','D'];
  const ipa = phonetics[correctWord.term] || '';
  const safeterm = correctWord.term.replace(/'/g,"\\'");

  container.innerHTML = `
    <div class="quiz-score">
      <div class="score-item s-correct">
        <div class="score-num">${quizState.correct}</div>
        <div class="score-label">Correct</div>
      </div>
      <div class="score-item s-wrong">
        <div class="score-num">${quizState.wrong}</div>
        <div class="score-label">Wrong</div>
      </div>
      <div class="score-item">
        <div class="score-num">${quizState.idx+1}/${u.words.length}</div>
        <div class="score-label">Progress</div>
      </div>
    </div>
    <div class="quiz-question">
      <div class="q-label">What does this term mean?</div>
      <div class="q-text">
        ${correctWord.term}
        <button class="speak-btn" onclick="speak('${safeterm}',this)" title="Listen">🔊</button>
      </div>
      ${ipa ? `<div class="phonetic" style="margin-top:0.4rem">${ipa}</div>` : ''}
    </div>
    <div class="q-options">
      ${options.map((opt, i) => `
        <button class="q-option" id="qopt-${i}" onclick="selectAnswer(${i}, ${options.indexOf(correctWord)}, '${opt.term.replace(/'/g,"\\'")}')">
          <span class="opt-letter">${letters[i]}</span>
          ${opt.def}
        </button>
      `).join('')}
    </div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <div id="nextBtnArea" style="margin-top:1rem;display:none;">
      <button class="nav-btn primary" onclick="nextQuiz()">Next Question →</button>
    </div>
  `;
}

function showQuizReport(u) {

  const total = u.words.length;
  const pct = Math.round(quizState.correct / total * 100);
  const grade = pct >= 90 ? 'A' : pct >= 80 ? 'B' : pct >= 70 ? 'C' : pct >= 60 ? 'D' : 'F';
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎯' : pct >= 50 ? '📚' : '💪';
  const msg = pct >= 90 ? 'Outstanding!' : pct >= 80 ? 'Excellent Work!' : pct >= 70 ? 'Good Job!' : pct >= 50 ? 'Keep Practising!' : 'Don\'t Give Up!';

  if (pct >= 80) markLearned();

  const wrongItems = quizHistory.filter(h => !h.correct);
  const correctItems = quizHistory.filter(h => h.correct);

  const now = new Date();
  const timeStr = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const dateStr = now.toLocaleDateString('en-GB');

  container.innerHTML = `
    <div class="quiz-report">
      <div class="report-header">
        <div class="report-trophy">${emoji}</div>
        <div class="report-name">📋 ${currentStudent} · Unit ${u.id}: ${u.title}</div>
        <div class="report-name" style="font-size:0.78rem;margin-top:0.2rem;color:var(--muted)">${dateStr} ${timeStr}</div>
        <div class="report-title">${msg} — Grade ${grade}</div>
        <div class="report-stats">
          <div class="report-stat rs-score"><div class="num">${pct}%</div><div class="lbl">Score</div></div>
          <div class="report-stat rs-correct"><div class="num">${quizState.correct}</div><div class="lbl">Correct</div></div>
          <div class="report-stat rs-wrong"><div class="num">${quizState.wrong}</div><div class="lbl">Wrong</div></div>
          <div class="report-stat"><div class="num">${total}</div><div class="lbl">Total</div></div>
        </div>
        <div class="report-grade-bar"><div class="report-grade-fill" id="gradeFill" style="width:0%"></div></div>
      </div>

      ${wrongItems.length > 0 ? `
      <div class="report-breakdown">
        <div class="report-breakdown-title">❌ Words to review (${wrongItems.length})</div>
        ${wrongItems.map(h => `
          <div class="breakdown-item bi-wrong">
            <span class="bi-icon">✗</span>
            <div>
              <div class="bi-term">${h.term} <button class="speak-btn" onclick="speak('${h.term.replace(/'/g,"\\'")}',this)">🔊</button></div>
              <div style="font-size:0.75rem;color:var(--accent3);margin:1px 0">${phonetics[h.term]||''}</div>
              <div class="bi-def">${h.def}</div>
              ${h.chosen ? `<div style="font-size:0.75rem;color:var(--wrong);margin-top:3px">You chose: ${h.chosen}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      ` : ''}

      ${correctItems.length > 0 ? `
      <div class="report-breakdown">
        <div class="report-breakdown-title">✅ Words you know (${correctItems.length})</div>
        ${correctItems.map(h => `
          <div class="breakdown-item bi-correct">
            <span class="bi-icon">✓</span>
            <div>
              <div class="bi-term">${h.term} <button class="speak-btn" onclick="speak('${h.term.replace(/'/g,"\\'")}',this)">🔊</button></div>
              <div style="font-size:0.75rem;color:var(--accent3);margin:1px 0">${phonetics[h.term]||''}</div>
              <div class="bi-def">${h.def}</div>
            </div>
          </div>
        `).join('')}
      </div>
      ` : ''}

      <div class="report-actions">
        <button class="nav-btn primary" onclick="quizState={idx:0,correct:0,wrong:0,answered:false};quizHistory=[];renderQuiz()">🔄 Try Again</button>
        <button class="nav-btn" onclick="setMode('list')">📋 Review Words</button>
        <button class="nav-btn" onclick="setMode('flash')">🃏 Flashcards</button>
      </div>
    </div>
  `;

  // animate bar after render
  setTimeout(() => {
    const fill = document.getElementById('gradeFill');
    if (fill) fill.style.width = pct + '%';
  }, 100);
}

function selectAnswer(chosen, correct, chosenTerm) {
  if (quizState.answered) return;
  quizState.answered = true;
  const btns = document.querySelectorAll('.q-option');
  btns.forEach(b => b.disabled = true);
  const u = units[currentUnitIdx];
  const correctWord = u.words[quizState.idx];
  const isCorrect = chosen === correct;

  // Record history
  quizHistory.push({
    term: correctWord.term,
    def: correctWord.def,
    correct: isCorrect,
    chosen: isCorrect ? null : chosenTerm
  });

  if (isCorrect) {
    quizState.correct++;
    btns[chosen].classList.add('correct');
    const fb = document.getElementById('quizFeedback');
    fb.className = 'quiz-feedback show correct';
    fb.innerHTML = `✓ Correct! ${correctWord.ex ? `<em>${correctWord.ex}</em>` : ''}`;
  } else {
    quizState.wrong++;
    btns[chosen].classList.add('wrong');
    btns[correct].classList.add('correct');
    const fb = document.getElementById('quizFeedback');
    fb.className = 'quiz-feedback show wrong';
    fb.innerHTML = `✗ Not quite. <strong>${correctWord.term}</strong>: ${correctWord.def}`;
  }
  document.getElementById('nextBtnArea').style.display = 'block';
}

function nextQuiz() {
  quizState.idx++;
  quizState.answered = false;
  renderQuiz();
}

// ===================== MATCH MODE =====================
function renderMatch() {
  const u = units[currentUnitIdx];
  const container = document.getElementById('modeMatch');
  const sample = u.words.slice(0,6); // 6 pairs for match
  matchState.total = sample.length;
  matchState.matched = 0;
  matchState.selected = null;
  matchState.selectedType = null;

  const termIds = sample.map((_,i) => 'T'+i);
  const defIds = sample.map((_,i) => 'D'+i);

  const shuffledDefs = [...sample].sort(() => Math.random()-0.5);

  container.innerHTML = `
    <div class="match-score">Matched: <span id="matchScore">0</span> / ${sample.length}</div>
    <div class="match-grid">
      <div>
        <div class="match-col-title">Terms</div>
        ${sample.map((w,i) => `<div class="match-item" id="T${i}" onclick="matchClick('T',${i},'${u.words.indexOf(w)}')">${w.term}</div>`).join('')}
      </div>
      <div>
        <div class="match-col-title">Definitions</div>
        ${shuffledDefs.map((w,i) => `<div class="match-item" id="D${i}" onclick="matchClick('D',${i},'${u.words.indexOf(w)}')" data-idx="${u.words.indexOf(w)}">${w.def.length > 80 ? w.def.substring(0,80)+'…' : w.def}</div>`).join('')}
      </div>
    </div>
    <div id="matchResult" style="margin-top:1rem;display:none;">
      <button class="nav-btn primary" onclick="renderMatch()">Play Again</button>
      <button class="nav-btn" style="margin-left:0.8rem" onclick="setMode('quiz')">Take Quiz</button>
    </div>
  `;

  // store original indices in term elements
  sample.forEach((w,i) => {
    document.getElementById('T'+i).dataset.idx = u.words.indexOf(w);
  });
}

function matchClick(type, elemIdx, wordIdx) {
  const id = type + elemIdx;
  const el = document.getElementById(id);
  if (el.classList.contains('matched')) return;

  if (matchState.selected === null) {
    // first selection
    if (matchState.selectedEl) matchState.selectedEl.classList.remove('selected');
    matchState.selected = wordIdx;
    matchState.selectedType = type;
    matchState.selectedElemId = id;
    el.classList.add('selected');
  } else {
    // second selection
    if (matchState.selectedType === type) {
      // same column — switch selection
      document.getElementById(matchState.selectedElemId).classList.remove('selected');
      matchState.selected = wordIdx;
      matchState.selectedElemId = id;
      el.classList.add('selected');
      return;
    }

    // different column — check match
    if (matchState.selected === wordIdx) {
      // MATCH!
      document.getElementById(matchState.selectedElemId).classList.remove('selected');
      document.getElementById(matchState.selectedElemId).classList.add('matched');
      el.classList.remove('selected');
      el.classList.add('matched');
      matchState.matched++;
      document.getElementById('matchScore').textContent = matchState.matched;
      if (matchState.matched === matchState.total) {
        markLearned();
        document.getElementById('matchResult').style.display = 'block';
      }
    } else {
      // WRONG
      document.getElementById(matchState.selectedElemId).classList.add('wrong-shake');
      el.classList.add('wrong-shake');
      setTimeout(() => {
        document.getElementById(matchState.selectedElemId)?.classList.remove('wrong-shake','selected');
        el.classList.remove('wrong-shake');
      }, 500);
    }
    matchState.selected = null;
    matchState.selectedType = null;
    matchState.selectedElemId = null;
  }
}

function markLearned() {
  learnedUnits.add(currentUnitIdx);
  const check = document.getElementById('ucheck-' + currentUnitIdx);
  if (check) check.textContent = '✓';
  document.getElementById('totalLearned').textContent = learnedUnits.size;
}

let currentStudent = '';

function doLogin() {
  const name = document.getElementById('inputName').value.trim();
  const pass = document.getElementById('inputPass').value.trim();
  const err = document.getElementById('loginError');
  if (!name) { err.textContent = '⚠ Please enter your name.'; return; }
  if (pass !== '2026') { err.textContent = '⚠ Incorrect password. Try again.'; return; }
  currentStudent = name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  const initials = name.split(' ').map(w=>w[0]?.toUpperCase()||'').join('').slice(0,2);
  document.getElementById('userAvatar').textContent = initials || name[0].toUpperCase();
  document.getElementById('userNameDisplay').textContent = name;
  init();
}

// ===================== TEXT-TO-SPEECH =====================
function speak(text, btnEl) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  if (btnEl) {
    btnEl.classList.add('speaking');
    utter.onend = () => btnEl.classList.remove('speaking');
    utter.onerror = () => btnEl.classList.remove('speaking');
  }
  window.speechSynthesis.speak(utter);
}
